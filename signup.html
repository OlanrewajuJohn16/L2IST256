<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BRICKLINE | User Signup</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Your custom CSS -->
  <link rel="stylesheet" href="styles.css">
</head>

<body class="perkspot">
  <header class="site-header">
    <div class="header-inner">
      <div>
        <h1 class="logo">BRICKLINE</h1>
        <p class="tagline">STREETWEAR ESSENTIALS. BUILT LIKE A BRICK.</p>
      </div>

      <a href="signup.html" class="cta-btn">Sign Up</a>
    </div>
  </header>

  <nav class="nav-bar">
    <a href="index.html">New</a>
    <a href="index.html">Shop</a>
    <a href="index.html">Featured</a>
    <a href="index.html">About</a>
    <a href="index.html">Contact</a>
    <a href="signup.html">Sign Up</a>
  </nav>

  <main class="container my-5">
    <div class="row justify-content-center">
      <div class="col-md-7 col-lg-6">
        <div class="card shadow-lg border-0 rounded-4">
          <div class="card-body p-4">
            <h2 class="text-center mb-3">User Signup</h2>
            <p class="text-center text-muted mb-4">
              Create an account to shop the latest BRICKLINE drops.
            </p>

            <form>
              <div class="mb-3">
                <label for="username" class="form-label">Username:</label>
                <input type="text" class="form-control" id="username" placeholder="Enter username">
              </div>

              <div class="mb-3">
                <label for="email" class="form-label">Email:</label>
                <input type="email" class="form-control" id="email" placeholder="Enter email">
              </div>

              <div class="mb-3">
                <label for="password" class="form-label">Password:</label>
                <input type="password" class="form-control" id="password" placeholder="Enter password">
              </div>

              <div class="mb-4">
                <label for="confirmPassword" class="form-label">Confirm Password:</label>
                <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm password">
              </div>

              <button type="submit" class="btn btn-dark w-100">Create Account</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="text-center py-4">
    <p>&copy; 2026 BRICKLINE. All Rights Reserved.</p>
  </footer>

  <!-- Bootstrap JavaScript CDN -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
